name: Package Med-GPT

on:
  workflow_dispatch:
  push:
    branches:
      - publish

defaults:
  run:
    shell: pwsh

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - windows-latest
          - macos-latest
          # - ubuntu-latest
    env:
      PROD: true
      GITHUB_CI: true
      GH_TOKEN: ${{ secrets.MED_GPT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Package App Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: pnpm run forge:win

      - name: Package App MacOS
        if: ${{ matrix.os == 'macos-latest' }}
        run: pnpm run forge:mac

      - name: Push Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Installer-${{ matrix.os }}
          path: dist

  publish:
    needs: package
    runs-on: windows-latest
    env:
      PROD: true
      GITHUB_CI: true
      GH_TOKEN: ${{ secrets.MED_GPT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Pull Artifact Windows
        uses: actions/download-artifact@v4
        with:
          name: Installer-windows-latest

      - name: Pull Artifact MacOS
        uses: actions/download-artifact@v4
        with:
          name: Installer-macos-latest

      - name: Publish Installers
        run: pnpm run publish
